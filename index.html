<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابعة الاشتراكات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1420;
    --surface:#171E2E;
    --surface-2:#1E2740;
    --border:#2A3450;
    --mint:#2DD4BF;
    --mint-dim: rgba(45,212,191,0.15);
    --amber:#F5A524;
    --amber-dim: rgba(245,165,36,0.15);
    --red:#F0576B;
    --red-dim: rgba(240,87,107,0.15);
    --text:#E8EAF0;
    --muted:#8A93A6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans Arabic','Cairo',sans-serif;
    min-height:100vh;
    padding:28px 18px 60px;
  }
  .wrap{max-width:960px;margin:0 auto;}
  h1{
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:28px;
    margin:0 0 4px;
    letter-spacing:-0.3px;
  }
  .sub{color:var(--muted);font-size:14px;margin:0 0 26px;}

  /* Radial wheel */
  .wheel-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
    display:flex;
    align-items:center;
    gap:24px;
    margin-bottom:24px;
    flex-wrap:wrap;
  }
  .wheel-card svg{flex-shrink:0;}
  .wheel-info{flex:1;min-width:200px;}
  .wheel-info .big{font-family:'Cairo',sans-serif;font-weight:800;font-size:22px;margin:0 0 6px;}
  .wheel-info .desc{color:var(--muted);font-size:13.5px;line-height:1.7;}

  .section-title{
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:16px;
    margin:28px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .count-pill{
    background:var(--mint-dim);
    color:var(--mint);
    font-size:12px;
    font-weight:700;
    padding:2px 9px;
    border-radius:99px;
  }

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    position:relative;
    overflow:hidden;
  }
  .card.today{border-color:var(--mint);box-shadow:0 0 0 1px var(--mint) inset;}
  .card.soon{border-color:var(--amber);}
  .card.overdue{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset;}
  .card .store{font-weight:700;font-size:15px;margin:0 0 2px;font-family:'Cairo',sans-serif;}
  .card .client{color:var(--muted);font-size:12.5px;margin:0 0 10px;}
  .card .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);}
  .card .amount{color:var(--text);font-weight:600;}
  .badge{
    position:absolute;top:12px;left:12px;
    font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;
  }
  .badge.today{background:var(--mint-dim);color:var(--mint);}
  .badge.soon{background:var(--amber-dim);color:var(--amber);}
  .badge.overdue{background:var(--red-dim);color:var(--red);}
  .pay-btn{
    margin-top:12px;width:100%;
    background:var(--mint);color:#08211D;border:none;
    font-weight:700;font-size:13px;padding:8px;border-radius:9px;cursor:pointer;
    font-family:inherit;
  }
  .pay-btn:hover{opacity:0.9;}
  .empty{color:var(--muted);font-size:13.5px;padding:14px 4px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px;}
  thead th{
    text-align:right;color:var(--muted);font-weight:600;font-size:12px;
    padding:8px 10px;border-bottom:1px solid var(--border);
  }
  tbody td{padding:10px;border-bottom:1px solid var(--border);}
  tbody tr:hover{background:var(--surface-2);}
  .svc-tag{
    font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface-2);color:var(--muted);
    border:1px solid var(--border);
  }
  .row-actions{display:flex;gap:6px;}
  .icon-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{color:var(--text);border-color:var(--muted);}

  .fab{
    position:fixed;bottom:28px;left:28px;
    background:var(--mint);color:#08211D;border:none;
    width:56px;height:56px;border-radius:50%;font-size:26px;font-weight:700;
    cursor:pointer;box-shadow:0 6px 20px rgba(45,212,191,0.35);
  }

  .modal-bg{
    position:fixed;inset:0;background:rgba(5,8,15,0.7);
    display:none;align-items:center;justify-content:center;padding:16px;z-index:50;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:22px;width:100%;max-width:420px;
  }
  .modal h2{font-family:'Cairo',sans-serif;font-size:18px;margin:0 0 16px;}
  label{display:block;font-size:12.5px;color:var(--muted);margin:12px 0 5px;}
  input,select{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 11px;border-radius:9px;font-size:14px;font-family:inherit;
  }
  input:focus,select:focus{outline:none;border-color:var(--mint);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn{
    flex:1;padding:10px;border-radius:9px;border:none;font-weight:700;font-size:14px;
    cursor:pointer;font-family:inherit;
  }
  .btn-primary{background:var(--mint);color:#08211D;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-danger{background:var(--red-dim);color:var(--red);}
  .loading{color:var(--muted);text-align:center;padding:40px;font-size:14px;}

  .tabs{display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;margin-bottom:22px;}
  .tab-btn{
    flex:1;background:transparent;border:none;color:var(--muted);
    padding:10px 8px;border-radius:9px;font-weight:700;font-size:13.5px;
    cursor:pointer;font-family:inherit;transition:background 0.15s;
  }
  .tab-btn.active{background:var(--mint-dim);color:var(--mint);}

  .rate-bar{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;margin-bottom:16px;font-size:13.5px;
  }
  .rate-bar .rate-val{color:var(--mint);font-weight:700;font-family:'Cairo',sans-serif;font-size:15px;}
  .rate-bar .rate-time{color:var(--muted);font-size:11.5px;}
  .icon-btn-sm{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;
  }
  .icon-btn-sm:hover{color:var(--text);}

  .calc-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
  .calc-row{display:flex;gap:10px;margin-bottom:12px;}
  .calc-row > div{flex:1;}
  .result-box{
    background:var(--surface-2);border:1px solid var(--border);border-radius:12px;
    padding:16px;margin-top:18px;
  }
  .result-line{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;color:var(--muted);}
  .result-line.total{
    border-top:1px solid var(--border);margin-top:8px;padding-top:12px;
    font-size:17px;font-weight:800;color:var(--mint);font-family:'Cairo',sans-serif;
  }
</style>
</head>

<div id="toast" style="position:fixed;bottom:28px;right:28px;background:#171E2E;border:1px solid #2DD4BF;color:#2DD4BF;padding:12px 18px;border-radius:10px;font-size:13.5px;display:none;z-index:60;font-family:'IBM Plex Sans Arabic',sans-serif;max-width:280px;"></div>

<script>
let subs = [];
let payments = [];
let editingId = null;
let editingPaymentId = null;
let activeTab = 'subs';

/* ====== إعدادات قاعدة البيانات (Supabase) ======
   حط هنا الـ Project URL والـ anon public key من صفحة Settings > API في مشروعك على supabase.com
*/
const SUPABASE_URL = 'https://fimudnycdfpvkpjqibtu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Zq6MwSx-bfuMkUUlw_8J9w_rD4WAioB';

function sbHeaders(extra){
  return {
    'apikey': SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    ...(extra || {})
  };
}

function isConfigured(){
  return !SUPABASE_URL.includes('xxxxxxxxxxxx') && SUPABASE_ANON_KEY.length > 0;
}

function toRemoteShape(s){
  return {
    id: s.id,
    store: s.store,
    client: s.client || null,
    service: s.service,
    day: s.day,
    amount: s.amount || 0,
    contact_method: s.contactMethod || null,
    contact_value: s.contactValue || null,
    last_paid: s.lastPaid || null,
    cancelled: !!s.cancelled
  };
}

function fromRemoteShape(r){
  return {
    id: r.id,
    store: r.store,
    client: r.client,
    service: r.service,
    day: r.day,
    amount: r.amount,
    contactMethod: r.contact_method,
    contactValue: r.contact_value,
    lastPaid: r.last_paid,
    cancelled: !!r.cancelled
  };
}

function toRemotePaymentShape(p){
  return {
    id: p.id,
    description: p.description,
    client: p.client || null,
    contact_method: p.contactMethod || null,
    contact_value: p.contactValue || null,
    amount: p.amount || 0,
    currency: p.currency || 'EGP',
    paid_date: p.paidDate || null
  };
}

function fromRemotePaymentShape(r){
  return {
    id: r.id,
    description: r.description,
    client: r.client,
    contactMethod: r.contact_method,
    contactValue: r.contact_value,
    amount: r.amount,
    currency: r.currency,
    paidDate: r.paid_date
  };
}


function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? '#F0576B' : '#2DD4BF';
  t.style.color = isError ? '#F0576B' : '#2DD4BF';
  t.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function exportData(){
  if(subs.length === 0){
    showToast('مفيش بيانات لسه عشان تتصدر', true);
    return;
  }
  const blob = new Blob([JSON.stringify(subs, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `اشتراكات-نسخة-احتياطية-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('تم تنزيل النسخة الاحتياطية بنجاح');
}

async function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!Array.isArray(parsed)) throw new Error('invalid format');

    let added = 0, updated = 0;
    parsed.forEach(item => {
      if(!item.store || !item.day) return;
      const idx = item.id ? subs.findIndex(s => s.id === item.id) : -1;
      if(idx > -1){
        subs[idx] = {...subs[idx], ...item};
        updated++;
      } else {
        subs.push({
          ...item,
          id: item.id || ('sub_' + Date.now() + '_' + Math.random().toString(36).slice(2,7))
        });
        added++;
      }
    });
    await saveData();
    render();
    showToast(`تم الاستيراد: ${added} جديد، ${updated} تحديث`);
  }catch(e){
    showToast('الملف مش صالح، تأكد إنه نفس ملف النسخة الاحتياطية', true);
  }
  event.target.value = '';
}


function todayInfo(){
  const now = new Date();
  return { day: now.getDate(), month: now.getMonth(), year: now.getFullYear() };
}

function toISODateLocal(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

/* بيرجع رقم: سالب = متأخر بكذا يوم، صفر = مستحق النهاردة، موجب = باقي كذا يوم.
   بياخد بالاعتبار هل اتدفع للدورة الحالية ولا لأ. */
function computeDiff(sub){
  const now = new Date();
  const todayLocal = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayStr = toISODateLocal(todayLocal);

  const lastDayThisMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const thisRenewalDay = Math.min(sub.day, lastDayThisMonth);
  const thisRenewalDate = new Date(now.getFullYear(), now.getMonth(), thisRenewalDay);
  const thisRenewalStr = toISODateLocal(thisRenewalDate);

  const paidThisCycle = sub.lastPaid && sub.lastPaid >= thisRenewalStr;

  if(paidThisCycle){
    const lastDayNext = new Date(now.getFullYear(), now.getMonth()+2, 0).getDate();
    const nextRenewalDay = Math.min(sub.day, lastDayNext);
    const nextRenewalDate = new Date(now.getFullYear(), now.getMonth()+1, nextRenewalDay);
    return Math.round((nextRenewalDate - todayLocal) / 86400000);
  }
  return Math.round((thisRenewalDate - todayLocal) / 86400000);
}

async function loadData(){
  if(!isConfigured()){
    showToast('محتاج تحط بيانات Supabase الأول في أعلى الكود (SUPABASE_URL و SUPABASE_ANON_KEY)', true);
    subs = [];
    payments = [];
    render();
    return;
  }
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?select=*`, {
      headers: sbHeaders()
    });
    if(!res.ok) throw new Error('fetch failed: ' + res.status);
    const rows = await res.json();
    subs = rows.map(fromRemoteShape);
  }catch(e){
    console.error('load error', e);
    showToast('حصل خطأ في تحميل بيانات الاشتراكات', true);
    subs = [];
  }
  await loadPayments();
  fetchLiveRate();
  render();
}

async function loadPayments(){
  if(!isConfigured()) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/payments?select=*`, {
      headers: sbHeaders()
    });
    if(!res.ok) throw new Error('fetch failed: ' + res.status);
    const rows = await res.json();
    payments = rows.map(fromRemotePaymentShape);
  }catch(e){
    console.error('load payments error', e);
    showToast('حصل خطأ في تحميل بيانات المدفوعات (اتأكدت من إنشاء جدول payments؟)', true);
    payments = [];
  }
}

async function savePayments(){
  if(!isConfigured()) return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/payments`, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
      body: JSON.stringify(payments.map(toRemotePaymentShape))
    });
  }catch(e){
    console.error('save payments error', e);
    showToast('حصل خطأ في حفظ المدفوعات', true);
  }
}

async function deleteRemotePaymentRow(id){
  if(!isConfigured()) return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/payments?id=eq.${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
  }catch(e){
    console.error('delete payment error', e);
    showToast('حصل خطأ في حذف الدفعة', true);
  }
}

async function saveData(){
  if(!isConfigured()) return;
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/subscriptions`, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),

function buildWheel(list){
  const subsList = list || subs;
  const t = todayInfo();
  const lastDay = new Date(t.year, t.month+1, 0).getDate();
  const cx = 90, cy = 90, r = 70;
  let dots = '';
  const dayCounts = {};
  subsList.forEach(s => {
    const d = Math.min(s.day, lastDay);
    dayCounts[d] = (dayCounts[d]||0) + 1;
  });

  for(let d=1; d<=lastDay; d++){
    const angle = (d / lastDay) * 2 * Math.PI - Math.PI/2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const isToday = d === t.day;
    const count = dayCounts[d] || 0;
    let fill = '#2A3450';
    let radius = 2.2;
    if(count > 0){ fill = '#F5A524'; radius = 3.2 + Math.min(count,4)*0.8; }
    if(isToday){ fill = '#2DD4BF'; radius = 5; }
    dots += `<circle cx="${x}" cy="${y}" r="${radius}" fill="${fill}"></circle>`;
  }
  return `<svg width="180" height="180" viewBox="0 0 180 180">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2A3450" stroke-width="1"></circle>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#E8EAF0" font-size="26" font-weight="800" font-family="Cairo,sans-serif">${t.day}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" fill="#8A93A6" font-size="11" font-family="Cairo,sans-serif">النهاردة</text>
    ${dots}
  </svg>`;
}

let liveUsdRate = null;

async function fetchLiveRate(){
  try{
    const res = await fetch('https://api.frankfurter.dev/v2/rate/USD/EGP');
    if(!res.ok) throw new Error('rate fetch failed');
    const data = await res.json();
    liveUsdRate = data.rate;
    rateLastUpdated = new Date();
    rateFetchFailed = false;
  }catch(e){
    console.error('rate error', e);
    rateFetchFailed = true;
  }
  render();
}

async function fetchRateFor(currency){
  if(currency === 'EGP') return 1;
  try{
    const res = await fetch(`https://api.frankfurter.dev/v2/rate/${currency}/EGP`);
    if(!res.ok) throw new Error('rate fetch failed');
    const data = await res.json();
    return data.rate;
  }catch(e){
    console.error('rate error', e);
    return null;
  }
}

function rateBarHtml(){
  let valText, timeText;
  if(rateFetchFailed && !liveUsdRate){
    valText = 'تعذر تحميل السعر';

  } else if(liveUsdRate){
    valText = `1$ = ${liveUsdRate.toFixed(2)} ج.م`;
    timeText = 'آخر تحديث: ' + rateLastUpdated.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});

    valText = 'جاري تحميل السعر...';
    timeText = '';
  }
  return `<div class="rate-bar">

let calcCurrency = 'EGP';

  calcCurrency = document.getElementById('calc_currency').value;

function runCalculation(){
  const amount = parseFloat(document.getElementById('calc_amount').value) || 0;
  calcAmountValue = document.getElementById('calc_amount').value;
  if(!amount){
    showToast('اكتب مبلغ صحيح الأول', true);
    return;
  }
  if(calcCurrency === 'EGP'){
    const bankFee = amount * 0.03;
    const profit = amount * 0.07;
    const total = amount + bankFee + profit;
    calcResult = {
      type: 'egp',
      original: amount,
      bankFee, profit, total
    };
  } else {
    const rateInput = document.getElementById('calc_rate');
    const rate = parseFloat(rateInput.value) || 0;
    if(!rate){
      showToast('محتاج سعر صرف صحيح', true);
      return;
    }
    calcRateValue = rate;
    const converted = amount * rate;
    const profit = converted * 0.10;
    const total = converted + profit;
    calcResult = {
      type: 'foreign',
      original: amount,
      currency: calcCurrency,
      rate, converted, profit, total
    };
  }
  render();
}

function renderSubsTab(){
  const activeSubs = subs.filter(s => !s.cancelled);
  const cancelledSubs = subs.filter(s => s.cancelled);

  const withDiff = activeSubs.map(s => ({...s, diff: computeDiff(s)}));
  const overdue = withDiff.filter(s => s.diff < 0).sort((a,b)=>a.diff-b.diff);
  const dueToday = withDiff.filter(s => s.diff === 0);
  const dueSoon = withDiff.filter(s => s.diff > 0 && s.diff <= 3).sort((a,b)=>a.diff-b.diff);
  const sortedAll = [...withDiff].sort((a,b)=>a.diff-b.diff);
  const totalMonthly = activeSubs.reduce((sum,s)=>sum+(s.amount||0),0);

  let html = `<p class="sub">${activeSubs.length} اشتراك نشط &middot; إجمالي شهري تقريبي $${totalMonthly.toFixed(2)}${cancelledSubs.length ? ' &middot; ' + cancelledSubs.length + ' ملغي' : ''}</p>

    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <button class="btn btn-ghost" style="flex:none;padding:8px 16px;" onclick="exportData()">⬇ تصدير نسخة احتياطية</button>
      <button class="btn btn-ghost" style="flex:none;padding:8px 16px;" onclick="document.getElementById('importFile').click()">⬆ استيراد نسخة</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>

    <div class="wheel-card">
      ${buildWheel(activeSubs)}
      <div class="wheel-info">
        <p class="big">${dueToday.length > 0 ? dueToday.length + ' تجديد النهاردة' : 'مفيش تجديدات النهاردة'}</p>
        <p class="desc">النقط الفاتحة (البرتقالي) بتمثل أيام فيها تجديدات، وكل ما كانت أكبر يبقى فيها اشتراكات أكتر. النقطة الخضرا هي يوم النهاردة.</p>
      </div>
    </div>`;

  if(overdue.length > 0){
    html += `<div class="section-title" style="color:var(--red);">⚠ متأخرة عن الدفع <span class="count-pill" style="background:var(--red-dim);color:var(--red);">${overdue.length}</span></div>
      <div class="cards">`;
    overdue.forEach(s => { html += cardHtml(s, 'overdue'); });
    html += `</div>`;
  }

  html += `<div class="section-title">تجديدات النهاردة <span class="count-pill">${dueToday.length}</span></div>
    <div class="cards">`;
  if(dueToday.length === 0){
    html += `<div class="empty">لا يوجد تجديدات مستحقة النهاردة.</div>`;
  } else {
    dueToday.forEach(s => { html += cardHtml(s, 'today'); });
  }
  html += `</div>`;

  html += `<div class="section-title">تجديدات قريبة (خلال ٣ أيام) <span class="count-pill">${dueSoon.length}</span></div>
    <div class="cards">`;
  if(dueSoon.length === 0){
    html += `<div class="empty">لا يوجد تجديدات قريبة.</div>`;
  } else {
    dueSoon.forEach(s => { html += cardHtml(s, 'soon'); });
  }
  html += `</div>`;

  html += `<div class="section-title">كل الاشتراكات النشطة <span class="count-pill">${activeSubs.length}</span></div>`;
  if(activeSubs.length === 0){
    html += `<div class="empty">لسه معملتش اشتراكات. دوس على زرار (+) تحت عشان تضيف أول اشتراك.</div>`;
  } else {
    html += `<table><thead><tr>
      <th>اسم الخدمة</th><th>العميل</th><th>النوع</th><th>تواصل</th><th>يوم التجديد</th><th>المبلغ</th><th>الحالة</th><th>آخر دفعة</th><th></th>
    </tr></thead><tbody>`;
    sortedAll.forEach(s => {

      if(s.diff < 0){ statusText = `متأخر ${Math.abs(s.diff)} يوم`; statusColor = 'var(--red)'; }
      else if(s.diff === 0){ statusText = 'النهاردة'; statusColor = 'var(--mint)'; }
      else { statusText = s.diff + ' يوم'; statusColor = 'var(--text)'; }
      html += `<tr>
        <td>${escapeHtml(s.store)}</td>
        <td>${escapeHtml(s.client || '—')}</td>
        <td>${fmtService(s.service)}</td>
        <td>${contactCellHtml(s)}</td>
        <td>${s.day}</td>
        <td>$${(s.amount||0).toFixed(2)}</td>
        <td style="color:${statusColor};font-weight:600;">${statusText}</td>
        <td>${s.lastPaid ? s.lastPaid : '—'}</td>
        <td>
          <div class="row-actions">
            ${pendingDeleteId === s.id ? `
              <button class="icon-btn" style="background:var(--red-dim);color:var(--red);border-color:var(--red);font-size:11px;width:auto;padding:0 8px;" onclick="deleteSub('${s.id}')" title="اضغط للتأكيد">تأكيد الحذف</button>

          </div>

    });
    html += `</tbody></table>`;

  if(cancelledSubs.length > 0){
    html += `<div class="section-title" style="color:var(--muted);">اشتراكات ملغاة <span class="count-pill" style="background:var(--surface-2);color:var(--muted);">${cancelledSubs.length}</span></div>

      <th>اسم الخدمة</th><th>العميل</th><th>النوع</th><th>المبلغ</th><th></th>
    </tr></thead><tbody>`;
    cancelledSubs.forEach(s => {
      html += `<tr style="opacity:0.55;">
        <td>${escapeHtml(s.store)}</td>
        <td>${escapeHtml(s.client || '—')}</td>
        <td>${fmtService(s.service)}</td>
        <td>$${(s.amount||0).toFixed(2)}</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" onclick="cancelSub('${s.id}')" title="إعادة التفعيل">↺</button>
            <button class="icon-btn" onclick="deleteSub('${s.id}')" title="حذف نهائي">✕</button>
          </div>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  return html;
}

function renderPaymentsTab(){
  const totalEgp = payments.filter(p=>p.currency==='EGP').reduce((s,p)=>s+(p.amount||0),0);
  const sorted = [...payments].sort((a,b)=> (b.paidDate||'').localeCompare(a.paidDate||''));

  let html = `<p class="sub">${payments.length} دفعة مسجلة &middot; إجمالي بالجنيه ${totalEgp.toFixed(2)} ج.م (المبالغ غير الجنيه مش محسوبة هنا)</p>`;

  html += `<div class="section-title">كل المدفوعات <span class="count-pill">${payments.length}</span></div>`;
  if(payments.length === 0){
    html += `<div class="empty">لسه معملتش دفعات. دوس على زرار (+) تحت عشان تضيف أول دفعة.</div>`;
  } else {
    html += `<table><thead><tr>
      <th>الوصف</th><th>العميل</th><th>تواصل</th><th>المبلغ</th><th>التاريخ</th><th></th>
    </tr></thead><tbody>`;
    sorted.forEach(p => {
      html += `<tr>
        <td>${escapeHtml(p.description)}</td>
        <td>${escapeHtml(p.client || '—')}</td>
        <td>${contactCellHtml(p)}</td>
        <td>${(p.amount||0).toFixed(2)} ${paymentCurrencyLabel(p.currency)}</td>
        <td>${p.paidDate || '—'}</td>
        <td>
          <div class="row-actions">
            ${pendingDeletePaymentId === p.id ? `
              <button class="icon-btn" style="background:var(--red-dim);color:var(--red);border-color:var(--red);font-size:11px;width:auto;padding:0 8px;" onclick="deletePayment('${p.id}')" title="اضغط للتأكيد">تأكيد الحذف</button>
              <button class="icon-btn" onclick="cancelDeletePayment()" title="إلغاء">↩</button>
            ` : `
              <button class="icon-btn" onclick="openPaymentModal(payments.find(x=>x.id==='${p.id}'))" title="تعديل">✎</button>
              <button class="icon-btn" onclick="deletePayment('${p.id}')" title="حذف">✕</button>
            `}
          </div>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  return html;
}

function renderCalcTab(){
  const showRateField = calcCurrency !== 'EGP';
  return `<p class="sub">احسب تكلفة الخدمة تلقائيًا حسب العملة</p>
    <div class="calc-card">
      <div class="calc-row">
        <div>
          <label style="margin-top:0;">المبلغ</label>
          <input id="calc_amount" type="number" step="0.01" placeholder="مثال: 100" value="${calcAmountValue}">
        </div>
        <div>
          <label style="margin-top:0;">العملة</label>
          <select id="calc_currency" onchange="onCalcCurrencyChange()">
            <option value="EGP" ${calcCurrency==='EGP'?'selected':''}>جنيه مصري</option>
            <option value="USD" ${calcCurrency==='USD'?'selected':''}>دولار أمريكي</option>
            <option value="EUR" ${calcCurrency==='EUR'?'selected':''}>يورو</option>
            <option value="GBP" ${calcCurrency==='GBP'?'selected':''}>جنيه إسترليني</option>
          </select>
        </div>
      </div>
      ${showRateField ? `
      <label style="margin-top:0;">سعر الصرف (جنيه لكل وحدة) — اتعبى تلقائي، وتقدر تعدله يدوي</label>
      <input id="calc_rate" type="number" step="0.0001" value="${calcRateValue !== null ? calcRateValue.toFixed(4) : ''}" placeholder="${calcRateValue===null ? 'جاري التحميل...' : ''}">
      ` : ''}
      <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="runCalculation()">احسب التكلفة</button>
      ${calcResultHtml()}
      <p style="color:var(--muted);font-size:12px;margin-top:16px;line-height:1.7;">
        القاعدة: لو المبلغ بالجنيه بيتضاف ٣٪ نسبة بنك + ٧٪ ربح. لو بعملة أجنبية، بيتحول للجنيه بسعر الصرف ثم يتضاف ١٠٪ ربح.
      </p>
    </div>`;
}

function isPaidToday(s){
  if(!s.lastPaid) return false;
  return s.lastPaid === new Date().toISOString().slice(0,10);
}

function cardHtml(s, kind){
  const c = contactLink(s);
  const paidToday = isPaidToday(s);
  let badgeText;
  if(s.diff < 0) badgeText = `متأخر ${Math.abs(s.diff)} يوم`;
  else if(kind === 'today') badgeText = 'النهاردة';
  else badgeText = 'خلال ' + s.diff + ' يوم';
  return `<div class="card ${kind}" style="${paidToday ? 'opacity:0.6;' : ''}">
    <span class="badge ${kind}">${badgeText}</span>
    <p class="store">${escapeHtml(s.store)}</p>
    <p class="client">${escapeHtml(s.client || '')} ${s.client ? '&middot; ' : ''}${s.service}</p>
    <div class="meta">
      <span>يوم ${s.day} من كل شهر</span>
      <span class="amount">$${(s.amount||0).toFixed(2)}</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      ${c ? `<a href="${c.url}" target="_blank" rel="noopener" class="btn btn-ghost" style="text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;">راسله</a>` : ''}
      ${paidToday
        ? `<button class="pay-btn" style="margin-top:0;flex:1;background:var(--surface-2);color:var(--mint);cursor:default;" disabled>تم الدفع اليوم ✅</button>`
        : `<button class="pay-btn" style="margin-top:0;flex:1;" onclick="markPaid('${s.id}')">تم الدفع ✓</button>`
      }
    </div>
  </div>`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', handleSave);
document.getElementById('modalBg').addEventListener('click', (e) => {
  if(e.target.id === 'modalBg') closeModal();
});
document.getElementById('paymentCancelBtn').addEventListener('click', closePaymentModal);
document.getElementById('paymentSaveBtn').addEventListener('click', handlePaymentSave);
document.getElementById('paymentModalBg').addEventListener('click', (e) => {
  if(e.target.id === 'paymentModalBg') closePaymentModal();
});

const APP_PASSWORD = '2742001'; // غيّر الرقم السري هنا لأي رقم تحبه
const REMEMBER_KEY = 'sub_tracker_unlocked_until';

function tryUnlock(){
  const val = document.getElementById('lockInput').value.trim();
  const err = document.getElementById('lockError');
  if(val === APP_PASSWORD){
    err.style.display = 'none';
    if(document.getElementById('rememberMe').checked){
      const expiry = Date.now() + (7 * 24 * 60 * 60 * 1000);
      try{ localStorage.setItem(REMEMBER_KEY, String(expiry)); }catch(e){}
    }
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    err.style.display = 'block';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

function checkRemembered(){
  try{
    const until = localStorage.getItem(REMEMBER_KEY);
    if(until && Date.now() < parseInt(until, 10)){
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData();
      return true;
    }
  }catch(e){}
  return false;
}

document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('lockInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') tryUnlock();
});

if(!checkRemembered()){
  document.getElementById('lockInput').focus();
}
